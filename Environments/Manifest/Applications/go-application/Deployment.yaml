apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-application
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-application
  template:
    metadata:
      labels:
        app: go-application
    spec:
      containers:
        - name: go-application
          image: kings5layer/prometheus-go-app:9d1fe0d
          imagePullPolicy: Always
          ports:
            - containerPort: 2112
          resources:
            limits:
              memory: "512Mi"
              cpu: "400m"
            requests:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 2112
            periodSeconds: 10
            initialDelaySeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 2112
            periodSeconds: 10
            initialDelaySeconds: 10
            failureThreshold: 3
